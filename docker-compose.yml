version: '3.8'

services:
  backend:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./models:/app/models
    environment:
      - HOST=0.0.0.0
      - PORT=7860
      - LOG_LEVEL=INFO
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
